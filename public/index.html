<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>議事録AI（エフシー）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>議事録AI ㈱エフシー仕様</h1>
      <p class="subtitle">取締役会議事録 自動生成</p>
      <button class="btn-apikey-toggle" id="btnApiKeyToggle" onclick="toggleApiKeyDialog()">
        <span class="key-icon">&#128273;</span>
        <span id="apiKeyLabel">APIキー未設定</span>
      </button>
    </header>

    <!-- APIキーダイアログ -->
    <div id="apiKeyOverlay" class="dialog-overlay hidden" onclick="closeApiKeyDialog(event)">
      <div class="dialog" onclick="event.stopPropagation()">
        <div class="dialog-header">
          <h3>Gemini APIキー設定</h3>
          <button class="dialog-close" onclick="toggleApiKeyDialog()">&times;</button>
        </div>
        <div class="dialog-body">
          <div class="apikey-row">
            <input type="password" id="apiKey" placeholder="Gemini APIキーを入力"
                   autocomplete="off" spellcheck="false">
            <button class="btn btn-accent" onclick="verifyApiKey()">確認</button>
          </div>
          <p id="apiKeyStatus" class="apikey-status"></p>
          <p class="hint"><a href="/guide.html" target="_blank"><strong>APIキーの取得方法はこちら</strong></a>（図解付き・2分で完了）<br>キーはブラウザにのみ保存され、サーバーには保存されません。</p>
        </div>
      </div>
    </div>

    <!-- 会議情報 -->
    <section class="card">
      <h2>会議情報</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="meetingTitle">会議名</label>
          <input type="text" id="meetingTitle" placeholder="例: 取締役会" value="取締役会">
        </div>
        <div class="form-group">
          <label for="meetingDate">日時</label>
          <input type="datetime-local" id="meetingDate">
        </div>
        <div class="form-group full-width">
          <label for="participants">出席取締役</label>
          <textarea id="participants" rows="3" placeholder="例: 田中二朗、三瀬逸雄、増田清、清水健志、中城多喜恵、村上克也、兵頭章夫"></textarea>
        </div>
      </div>
    </section>

    <!-- ステップ1: 音声ファイルアップロード -->
    <section class="card">
      <h2>
        <span class="step-badge">1</span>
        音声ファイル
      </h2>
      <div class="upload-area" id="dropZone">
        <input type="file" id="audioFile" accept="audio/*,.mp3,.wav,.m4a,.mp4,.ogg,.webm,.flac,.aac" hidden>
        <div class="upload-icon">&#127908;</div>
        <p class="upload-main">クリックまたはドラッグ&ドロップで音声ファイルを選択</p>
        <p class="upload-sub">対応形式: MP3, WAV, M4A, MP4, OGG, WebM, FLAC, AAC</p>
      </div>
      <div id="fileInfo" class="file-info hidden">
        <span id="fileName" class="file-name"></span>
        <span id="fileSize" class="file-size"></span>
        <button class="btn btn-sm btn-remove" onclick="removeFile()">削除</button>
      </div>
      <div class="action-bar-left">
        <button id="btnTranscribe" class="btn btn-accent" onclick="transcribeAudio()" disabled>
          文字起こし開始
        </button>
      </div>
    </section>

    <!-- ステップ2: 文字起こし結果 -->
    <section id="transcriptSection" class="card">
      <h2>
        <span class="step-badge">2</span>
        文字起こし結果
      </h2>
      <div class="transcript-header">
        <p class="hint">内容を確認・編集してから議事録を生成してください。</p>
        <button class="btn btn-sm btn-docx" onclick="downloadTranscriptDocx()">Word</button>
      </div>
      <textarea id="transcript" rows="12" placeholder="音声ファイルの文字起こし結果がここに表示されます。&#10;Google AI Studio等で文字起こし済みのテキストを直接貼り付けることもできます。"></textarea>
    </section>

    <!-- テキストメモ -->
    <section class="card">
      <h2>テキストメモ・補足（任意）</h2>
      <textarea id="memo" rows="5" placeholder="ここに書いた内容はAIが議事録に反映します。&#10;例えば「話者Aは田中社長」「議題3は来月に持ち越しになった」など書いておくと、AIがそれを考慮して議事録に組み込みます。"></textarea>
    </section>

    <!-- 生成ボタン -->
    <div class="action-bar">
      <button id="btnGenerate" class="btn btn-primary" onclick="generateMinutes()">
        議事録を生成
      </button>
    </div>

    <!-- 結果 -->
    <section id="resultSection" class="card result-card hidden">
      <div class="result-header">
        <h2>生成された議事録</h2>
        <div class="result-actions">
          <button class="btn btn-sm" onclick="copyResult()">コピー</button>
          <button class="btn btn-sm btn-docx" onclick="downloadDocx()">Word</button>
        </div>
      </div>
      <div class="result-tabs">
        <button class="tab active" onclick="switchTab('preview')" id="tabPreview">プレビュー</button>
        <button class="tab" onclick="switchTab('edit')" id="tabEdit">編集</button>
      </div>
      <div id="resultPreview" class="result-preview"></div>
      <textarea id="resultEdit" class="result-edit hidden" rows="20"></textarea>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
